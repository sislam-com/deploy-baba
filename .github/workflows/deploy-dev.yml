name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_DEV_ROLE_ARN }}
          aws-region: us-east-1

      # ── Build Lambda ──────────────────────────────────────────────────────────

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build Lambda binary
        run: |
          cargo lambda build --release --package deploy-baba-ui --target aarch64-unknown-linux-gnu
          mkdir -p infra/build
          zip -j infra/build/lambda.zip target/lambda/deploy-baba-ui/bootstrap

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.DEV_UI_FN_NAME }} \
            --zip-file fileb://infra/build/lambda.zip \
            --architectures arm64 \
            --region us-east-1

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.DEV_UI_FN_NAME }} \
            --region us-east-1

      # ── Smoke test ────────────────────────────────────────────────────────────

      - name: Smoke test /health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.DEV_FN_URL }}health" || echo "000")
          echo "Health check status: ${STATUS}"
          [[ "${STATUS}" == "200" ]]

      # ── Tag dev release ───────────────────────────────────────────────────────

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create dev-vX.Y.Z tag
        run: cargo run -q -p xtask -- release tag --kind dev --push
