name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_DEV_ROLE_ARN }}
          aws-region: us-east-1

      # ── Load deploy identifiers from Secrets Manager ──────────────────────────
      # SPA_BUCKET, CLOUDFRONT_ID, UI_FN_NAME, FN_URL are stored in SM (W-SEC).
      # Only the bootstrap role ARN lives in GitHub Variables.

      - name: Load deploy config from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id deploy-baba/dev/deploy-config \
            --query SecretString --output text)
          echo "SPA_BUCKET=$(echo "$SECRET" | jq -r .spa_bucket)" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_ID=$(echo "$SECRET" | jq -r .cloudfront_id)" >> "$GITHUB_ENV"
          echo "UI_FN_NAME=$(echo "$SECRET" | jq -r .ui_fn_name)" >> "$GITHUB_ENV"
          echo "AGENT_FN_NAME=$(echo "$SECRET" | jq -r .agent_fn_name)" >> "$GITHUB_ENV"
          echo "FN_URL=$(echo "$SECRET" | jq -r .fn_url)" >> "$GITHUB_ENV"

      # ── Build Lambda ──────────────────────────────────────────────────────────

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build Lambda binary
        run: |
          cargo lambda build --release --package deploy-baba-ui --target aarch64-unknown-linux-gnu
          mkdir -p infra/build
          zip -j infra/build/lambda.zip target/lambda/deploy-baba-ui/bootstrap

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$UI_FN_NAME" \
            --zip-file fileb://infra/build/lambda.zip \
            --architectures arm64 \
            --region us-east-1

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "$UI_FN_NAME" \
            --region us-east-1

      # ── Build + deploy Agent Lambda ──────────────────────────────────────────

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build agent Lambda zip
        run: |
          mkdir -p build/agent-lambda infra/build
          cd services/agent
          uv export --frozen --no-dev --no-emit-project > /tmp/agent-requirements.txt
          pip install --target ../../build/agent-lambda -r /tmp/agent-requirements.txt --quiet
          cp -r src/* ../../build/agent-lambda/
          cd ../../build/agent-lambda
          zip -qr ../../infra/build/agent-lambda.zip .

      - name: Update agent Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$AGENT_FN_NAME" \
            --zip-file fileb://infra/build/agent-lambda.zip \
            --region us-east-1

      - name: Wait for agent Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "$AGENT_FN_NAME" \
            --region us-east-1

      # ── Build + deploy SPA ────────────────────────────────────────────────────

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: pnpm --dir web install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: cargo run -q -p api-openapi --bin emit-spec > web/openapi.json

      - name: Generate TypeScript types
        run: pnpm --dir web exec openapi-typescript openapi.json -o src/api/types.gen.ts

      - name: Build SPA
        run: pnpm --dir web run build

      - name: Sync SPA to S3
        run: |
          aws s3 sync web/dist/ "s3://${SPA_BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp web/dist/index.html "s3://${SPA_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          if [ -z "$CLOUDFRONT_ID" ]; then
            echo "No CloudFront distribution — skipping invalidation"
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/index.html" "/"

      # ── Smoke test ────────────────────────────────────────────────────────────

      - name: Smoke test /health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${FN_URL}/health" || echo "000")
          echo "Health check status: ${STATUS}"
          [[ "${STATUS}" == "200" ]]

      # ── Tag dev release ───────────────────────────────────────────────────────

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verify worktree clean before tag
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Worktree dirty before release tag — see diff below"
            git status --porcelain
            git diff --stat
            git diff -- Cargo.lock web/pnpm-lock.yaml web/package.json | head -100
            exit 1
          fi

      - name: Create dev-vX.Y.Z tag
        run: cargo run -q -p xtask -- release tag --kind dev --push

      - name: Promote dev-vX.Y.Z to vX.Y.Z (triggers prod deploy)
        run: cargo run -q -p xtask -- release promote --push
