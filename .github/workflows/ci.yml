name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace

  tofu:
    name: OpenTofu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v2
      - run: tofu fmt -check -recursive infra/
      - run: tofu -chdir=infra init -backend=false
      - run: tofu -chdir=infra validate

  agent:
    name: Agent (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install dependencies
        run: cd services/agent && uv sync --dev
      - name: Lint (ruff check)
        run: cd services/agent && uv run ruff check src/ tests/
      - name: Format check (ruff format)
        run: cd services/agent && uv run ruff format --check src/ tests/
      - name: Type check (mypy)
        run: cd services/agent && uv run mypy src/
      - name: Tests (pytest)
        run: cd services/agent && uv run pytest tests/ -v

  web:
    name: Web / SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm --dir web install --frozen-lockfile
      - run: cargo run -q -p api-openapi --bin emit-spec > web/openapi.json
      - run: pnpm --dir web exec openapi-typescript openapi.json -o src/api/types.gen.ts
      - run: pnpm --dir web run typecheck
      - run: pnpm --dir web run test --run
      - run: pnpm --dir web run coverage
      - uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage
          retention-days: 7
      - run: pnpm --dir web run build
