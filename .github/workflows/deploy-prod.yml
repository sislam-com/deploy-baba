name: Deploy Prod

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.CI_DEPLOY_PROD_ROLE_ARN }}
          aws-region: us-east-1

      # ── Load deploy identifiers from Secrets Manager ──────────────────────────

      - name: Load deploy config from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id deploy-baba/prod/deploy-config \
            --query SecretString --output text)
          echo "SPA_BUCKET=$(echo "$SECRET" | jq -r .spa_bucket)" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_ID=$(echo "$SECRET" | jq -r .cloudfront_id)" >> "$GITHUB_ENV"
          echo "UI_FN_NAME=$(echo "$SECRET" | jq -r .ui_fn_name)" >> "$GITHUB_ENV"
          echo "FN_URL=$(echo "$SECRET" | jq -r .fn_url)" >> "$GITHUB_ENV"

      # ── Build Lambda ──────────────────────────────────────────────────────────

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build Lambda binary
        run: |
          cargo lambda build --release --package deploy-baba-ui --target aarch64-unknown-linux-gnu
          mkdir -p infra/build
          zip -j infra/build/lambda.zip target/lambda/deploy-baba-ui/bootstrap

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$UI_FN_NAME" \
            --zip-file fileb://infra/build/lambda.zip \
            --architectures arm64 \
            --region us-east-1

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name "$UI_FN_NAME" \
            --region us-east-1

      # ── Build + deploy SPA ────────────────────────────────────────────────────

      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web deps
        run: pnpm --dir web install --frozen-lockfile

      - name: Generate OpenAPI spec
        run: cargo run -q -p api-openapi --bin emit-spec > web/openapi.json

      - name: Generate TypeScript types
        run: pnpm --dir web exec openapi-typescript openapi.json -o src/api/types.gen.ts

      - name: Build SPA
        run: pnpm --dir web run build

      - name: Sync SPA to S3
        run: |
          aws s3 sync web/dist/ "s3://${SPA_BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp web/dist/index.html "s3://${SPA_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/index.html" "/"

      # ── Smoke test ────────────────────────────────────────────────────────────

      - name: Smoke test /health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${FN_URL}/health" || echo "000")
          echo "Health check status: ${STATUS}"
          [[ "${STATUS}" == "200" ]]
