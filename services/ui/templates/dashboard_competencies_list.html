{% extends "base.html" %}

{% block title %}Competencies — Dashboard{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <nav class="text-sm text-gray-400 mb-1">
        <a href="/dashboard" class="hover:text-white transition">Dashboard</a>
        <span class="mx-2">›</span>
        <span class="text-white">Competencies</span>
      </nav>
      <h1 class="text-2xl font-bold text-white">Competencies</h1>
      <p class="text-gray-400 text-xs mt-1">{{ username }}</p>
    </div>
    <a href="/auth/logout"
       class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 hover:text-white rounded-lg text-sm transition">
      Logout
    </a>
  </div>

  <!-- Competency list -->
  <div class="space-y-2">
    {% for comp in competencies %}
    <a href="/dashboard/competencies/{{ comp.slug }}"
       class="flex items-center justify-between bg-gray-800 hover:bg-gray-700 rounded-xl px-5 py-4 transition group">
      <div>
        <span class="text-white font-medium group-hover:text-cyan-300 transition">{{ comp.name }}</span>
        <span class="text-gray-400 text-sm ml-3">{{ comp.slug }}</span>
      </div>
      <span class="text-gray-500 text-xs">›</span>
    </a>
    {% else %}
    <div class="text-center py-16 text-gray-500">No competencies yet.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
