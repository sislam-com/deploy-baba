{% extends "base.html" %}

{% block title %}About Me — Sharful Islam{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <!-- Page header -->
    <div class="mb-10">
        <h1 class="text-4xl font-bold text-white mb-2">About</h1>
        <p class="text-gray-400">Learn more about me and this project.</p>
    </div>

    <!-- Tab toggle -->
    <div class="flex space-x-2 mb-10">
        <a href="/about/me"
           class="px-5 py-2 rounded-lg text-sm font-medium bg-cyan-600 text-white">
            About Me
        </a>
        <a href="/about/repo"
           class="px-5 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-700 transition">
            About This Repo
        </a>
    </div>

    <!-- Sections -->
    <div class="space-y-6">
        {% for section in sections %}
        <div class="bg-gray-800/50 rounded-lg p-6 border border-gray-700">
            <h2 class="text-xl font-semibold text-cyan-400 mb-3">{{ section.heading }}</h2>
            <p class="text-gray-300 leading-relaxed">{{ section.body }}</p>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
